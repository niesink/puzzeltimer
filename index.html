<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧩 Legpuzzel Tournooi Middel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Orbitron:wght@700;900&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --navy: #07072a;
            --navy2: #0d0d3d;
            --yellow: #f5a623;
            --yellow2: #ffe066;
            --pink: #e91e8c;
            --pink2: #ff5cbc;
            --orange: #ff6b35;
            --green: #3ddc84;
            --blue: #4fc3f7;
            --purple: #b36bff;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--navy);
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            user-select: none;
        }

        /* ══ Background canvas (lightning + stars) ══ */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ══ Floating puzzle pieces ══ */
        .pieces-layer {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .piece {
            position: absolute;
            font-size: 42px;
            animation: floatPiece linear infinite;
            opacity: 0.85;
            filter: drop-shadow(0 0 8px currentColor);
        }

        @keyframes floatPiece {
            0% {
                transform: translateY(110vh) rotate(0deg);
                opacity: 0;
            }

            5% {
                opacity: 0.85;
            }

            95% {
                opacity: 0.85;
            }

            100% {
                transform: translateY(-20vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ══ Main layout ══ */
        .wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: clamp(14px, 2.5vh, 32px);
            padding: 28px 24px;
        }

        /* ══ Title ══ */
        .title-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            line-height: 1.0;
        }

        .title-line1 {
            font-family: 'Boogaloo', cursive;
            font-size: clamp(28px, 5vw, 72px);
            color: var(--yellow);
            text-shadow:
                0 0 20px rgba(245, 166, 35, 0.8),
                0 2px 0 rgba(0, 0, 0, 0.5);
            letter-spacing: 0.08em;
        }

        .title-line2 {
            font-family: 'Boogaloo', cursive;
            font-size: clamp(40px, 8vw, 110px);
            color: var(--pink);
            text-shadow:
                0 0 30px rgba(233, 30, 140, 0.9),
                0 2px 0 rgba(0, 0, 0, 0.5);
            letter-spacing: 0.04em;
            margin-top: -0.05em;
        }

        .title-line3 {
            font-family: 'Boogaloo', cursive;
            font-size: clamp(34px, 6vw, 84px);
            color: var(--yellow);
            text-shadow:
                0 0 20px rgba(245, 166, 35, 0.8),
                0 2px 0 rgba(0, 0, 0, 0.5);
            letter-spacing: 0.08em;
            margin-top: -0.05em;
        }

        /* ══ Timer card ══ */
        .timer-card {
            background: rgba(13, 13, 61, 0.75);
            border: 2px solid rgba(245, 166, 35, 0.35);
            border-radius: 28px;
            padding: clamp(20px, 3.5vh, 52px) clamp(32px, 6vw, 110px);
            backdrop-filter: blur(16px);
            box-shadow:
                0 0 0 1px rgba(233, 30, 140, 0.15),
                0 24px 60px rgba(0, 0, 0, 0.7),
                0 0 60px rgba(245, 166, 35, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: border-color 0.4s, box-shadow 0.4s;
        }

        .timer-card.running {
            border-color: rgba(245, 166, 35, 0.7);
            box-shadow:
                0 0 0 1px rgba(233, 30, 140, 0.3),
                0 24px 60px rgba(0, 0, 0, 0.7),
                0 0 100px rgba(245, 166, 35, 0.3),
                0 0 180px rgba(233, 30, 140, 0.15);
        }

        .timer-label {
            font-size: clamp(11px, 1.1vw, 17px);
            font-weight: 600;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
        }

        .timer-display {
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: clamp(72px, 14vw, 200px);
            font-weight: 900;
            letter-spacing: 0.04em;
            line-height: 1;
            color: var(--yellow);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            text-shadow:
                0 0 40px rgba(245, 166, 35, 0.9),
                0 0 80px rgba(245, 166, 35, 0.4),
                0 4px 0 rgba(0, 0, 0, 0.6);
            transition: color 0.3s, text-shadow 0.3s;
        }

        /* Fixed-width digit pairs so card never changes width */
        .timer-display #hh,
        .timer-display #mm,
        .timer-display #ss {
            display: inline-block;
            width: 2.2ch;
            text-align: center;
        }

        .timer-display.pulse {
            animation: tPulse 0.1s ease-out;
        }

        @keyframes tPulse {
            0% {
                transform: scale(1.012);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Colon blink */
        .sep {
            display: inline-block;
            position: relative;
            top: -4px;
            color: var(--pink);
            animation: blink 1s step-start infinite;
        }

        .sep.paused {
            animation: none;
            opacity: 0.25;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.1;
            }
        }

        /* ══ Status pill ══ */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 18px;
            border-radius: 999px;
            font-size: clamp(11px, 1vw, 15px);
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: background 0.3s, color 0.3s;
        }

        .status-pill.idle {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.45);
        }

        .status-pill.running {
            background: rgba(61, 220, 132, 0.18);
            color: var(--green);
        }

        .status-pill.paused {
            background: rgba(245, 166, 35, 0.18);
            color: var(--yellow);
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-pill.running .status-dot {
            animation: dotPulse 1s ease-in-out infinite;
        }

        @keyframes dotPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.6);
                opacity: 0.5;
            }
        }

        /* ══ Controls ══ */
        .controls {
            display: flex;
            gap: clamp(12px, 2vw, 28px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            font-family: 'Boogaloo', cursive;
            font-size: clamp(18px, 2vw, 28px);
            letter-spacing: 0.06em;
            border: none;
            border-radius: 16px;
            padding: clamp(10px, 1.5vh, 18px) clamp(28px, 4vw, 64px);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.15);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn:hover::after {
            opacity: 1;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-start {
            background: linear-gradient(135deg, #3ddc84, #00b85c);
            color: #07072a;
            box-shadow: 0 8px 28px rgba(61, 220, 132, 0.45);
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(61, 220, 132, 0.55);
        }

        .btn-pause {
            background: linear-gradient(135deg, var(--yellow), #d4870a);
            color: #07072a;
            box-shadow: 0 8px 28px rgba(245, 166, 35, 0.5);
        }

        .btn-pause:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(245, 166, 35, 0.6);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-reset:hover {
            transform: translateY(-3px);
            color: #fff;
        }

        /* ══ Footer hint ══ */
        .footer {
            font-size: clamp(10px, 0.9vw, 14px);
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.08em;
        }

        .footer kbd {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            padding: 1px 6px;
            font-family: 'Outfit', sans-serif;
        }

        /* ══════════════════════════════════════
       COUNTDOWN OVERLAY
    ══════════════════════════════════════ */
        #countdown-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            background: rgba(7, 7, 42, 0.92);
            backdrop-filter: blur(6px);
            transition: opacity 0.5s;
        }

        #countdown-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .cd-title {
            font-family: 'Boogaloo', cursive;
            font-size: clamp(22px, 3.5vw, 52px);
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        #cd-number {
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: clamp(120px, 24vw, 340px);
            font-weight: 900;
            line-height: 1;
            color: var(--yellow);
            text-shadow:
                0 0 60px rgba(245, 166, 35, 1),
                0 0 120px rgba(245, 166, 35, 0.5),
                0 6px 0 rgba(0, 0, 0, 0.7);
            animation: cdPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        #cd-number.go {
            color: var(--green);
            text-shadow:
                0 0 60px rgba(61, 220, 132, 1),
                0 0 120px rgba(61, 220, 132, 0.5),
                0 6px 0 rgba(0, 0, 0, 0.7);
        }

        @keyframes cdPop {
            0% {
                transform: scale(0.4);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes cdFade {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        #cd-number.fading {
            animation: cdFade 0.35s ease-in forwards;
        }

        .cd-sub {
            font-family: 'Boogaloo', cursive;
            font-size: clamp(18px, 2.5vw, 36px);
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 0.2em;
        }

        /* Countdown duration buttons */
        .cd-setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-top: 8px;
        }

        .cd-setup p {
            font-family: 'Boogaloo', cursive;
            font-size: clamp(16px, 1.8vw, 26px);
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.1em;
        }

        .cd-btns {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cd-btn {
            font-family: 'Boogaloo', cursive;
            font-size: clamp(16px, 1.6vw, 24px);
            padding: 10px 28px;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.07);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }

        .cd-btn:hover,
        .cd-btn.active {
            background: rgba(245, 166, 35, 0.25);
            border-color: var(--yellow);
            color: var(--yellow);
        }

        .cd-btn-start {
            font-family: 'Boogaloo', cursive;
            font-size: clamp(20px, 2.2vw, 32px);
            padding: 12px 56px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, var(--pink), #c0006a);
            color: #fff;
            box-shadow: 0 8px 30px rgba(233, 30, 140, 0.5);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .cd-btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(233, 30, 140, 0.65);
        }

        .cd-btn-skip {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(12px, 1.1vw, 16px);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            letter-spacing: 0.1em;
            text-decoration: underline;
            transition: color 0.2s;
        }

        .cd-btn-skip:hover {
            color: rgba(255, 255, 255, 0.65);
        }
    </style>
</head>

<body>

    <canvas id="bg-canvas"></canvas>
    <div class="pieces-layer" id="piecesLayer"></div>

    <!-- ══ COUNTDOWN OVERLAY ══ -->
    <div id="countdown-overlay">
        <!-- Phase A: setup -->
        <div id="cd-setup-view">
            <div class="cd-title">🧩 Legpuzzel Tournooi Middel</div>
            <div style="height:16px"></div>
            <div class="cd-setup">
                <p>Hoe lang aftellen?</p>
                <div class="cd-btns">
                    <button class="cd-btn" onclick="selectCD(3)">3 sec</button>
                    <button class="cd-btn active" onclick="selectCD(5)">5 sec</button>
                    <button class="cd-btn" onclick="selectCD(10)">10 sec</button>
                </div>
                <div style="height:8px"></div>
                <button class="cd-btn-start" onclick="beginCountdown()">▶ Start aftelling</button>
                <div style="height:4px"></div>
                <button class="cd-btn-skip" onclick="skipCountdown()">Overslaan & direct starten</button>
            </div>
        </div>

        <!-- Phase B: counting -->
        <div id="cd-run-view" style="display:none; flex-direction:column; align-items:center; gap:16px;">
            <div class="cd-title" style="color:rgba(255,255,255,0.35)">De wedstrijd begint over…</div>
            <div id="cd-number">5</div>
            <div class="cd-sub" id="cd-sub-text">seconden</div>
        </div>
    </div>

    <!-- ══ MAIN TIMER PAGE ══ -->
    <div class="wrapper">

        <div class="title-block">
            <div class="title-line1">Legpuzzel</div>
            <div class="title-line2">Tournooi</div>
            <div class="title-line3">Middel</div>
        </div>

        <div class="timer-card" id="timerCard">
            <div class="timer-label">Verstreken tijd</div>
            <div class="timer-display" id="display">
                <span id="hh">00</span><span class="sep" id="sep1">:</span><span id="mm">00</span><span class="sep"
                    id="sep2">:</span><span id="ss">00</span>
            </div>
            <div class="status-pill idle" id="statusPill">
                <div class="status-dot"></div>
                <span id="statusText">Klaar om te starten</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="btnStart" onclick="startTimer()">▶ Start</button>
            <button class="btn btn-reset" id="btnReset" onclick="resetTimer()">⟳ Reset</button>
        </div>

        <div class="footer">
            Druk op <kbd>Spatie</kbd> om te starten / pauzeren &nbsp;·&nbsp; <kbd>R</kbd> om te resetten
        </div>

    </div>

    <script>
        // ══════════════════════════════════════════
        //  COUNTDOWN LOGIC
        // ══════════════════════════════════════════
        let cdDuration = 5;

        function selectCD(secs) {
            cdDuration = secs;
            document.querySelectorAll('.cd-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function beginCountdown() {
            document.getElementById('cd-setup-view').style.display = 'none';
            const runView = document.getElementById('cd-run-view');
            runView.style.display = 'flex';

            let t = cdDuration;
            const numEl = document.getElementById('cd-number');
            const subEl = document.getElementById('cd-sub-text');

            function showNum(n) {
                numEl.classList.remove('fading', 'go');
                numEl.textContent = n;
                void numEl.offsetWidth;
                numEl.style.animation = 'none';
                void numEl.offsetWidth;
                numEl.style.animation = '';
            }

            function tick() {
                showNum(t);
                subEl.textContent = t === 1 ? 'seconde' : 'seconden';

                if (t <= 0) {
                    // "GO!"
                    numEl.classList.add('go');
                    numEl.textContent = 'GO!';
                    subEl.textContent = '';
                    setTimeout(() => {
                        document.getElementById('countdown-overlay').classList.add('hidden');
                        startTimer();
                    }, 900);
                    return;
                }

                setTimeout(() => {
                    numEl.classList.add('fading');
                    setTimeout(() => { t--; tick(); }, 350);
                }, 650);
            }

            tick();
        }

        function skipCountdown() {
            document.getElementById('countdown-overlay').classList.add('hidden');
            startTimer();
        }

        // ══════════════════════════════════════════
        //  TIMER LOGIC
        // ══════════════════════════════════════════
        function parseStartValue(value) {
            if (!value) return 0;
            const trimmed = value.trim();
            if (/^\d+$/.test(trimmed)) {
                return parseInt(trimmed, 10) * 1000;
            }
            if (/^\d{1,2}:\d{1,2}(:\d{1,2})?$/.test(trimmed)) {
                const parts = trimmed.split(':').map(Number);
                let hours = 0, minutes = 0, seconds = 0;
                if (parts.length === 3) {
                    [hours, minutes, seconds] = parts;
                } else {
                    [minutes, seconds] = parts;
                }
                if (hours > 23 || minutes > 59 || seconds > 59) return 0;
                return ((hours * 3600) + (minutes * 60) + seconds) * 1000;
            }
            return 0;
        }

        function getInitialElapsedFromQuery() {
            const params = new URLSearchParams(window.location.search);
            return parseStartValue(params.get('start'));
        }

        let startTime = null, elapsed = getInitialElapsedFromQuery(), rafId = null, isRunning = false;

        const hhEl = document.getElementById('hh');
        const mmEl = document.getElementById('mm');
        const ssEl = document.getElementById('ss');
        const sep1 = document.getElementById('sep1');
        const sep2 = document.getElementById('sep2');
        const displayEl = document.getElementById('display');
        const cardEl = document.getElementById('timerCard');
        const pillEl = document.getElementById('statusPill');
        const statusTxt = document.getElementById('statusText');
        const btnStart = document.getElementById('btnStart');

        function pad(n) { return String(n).padStart(2, '0'); }
        let prevSec = -1;

        function renderTime(totalMs) {
            const secs = Math.floor(totalMs / 1000);
            prevSec = secs;
            hhEl.textContent = pad(Math.floor(secs / 3600));
            mmEl.textContent = pad(Math.floor((secs % 3600) / 60));
            ssEl.textContent = pad(secs % 60);
        }

        renderTime(elapsed);

        function tick() {
            const total = elapsed + (performance.now() - startTime);
            const secs = Math.floor(total / 1000);
            if (secs !== prevSec) {
                renderTime(total);
                displayEl.classList.remove('pulse');
                void displayEl.offsetWidth;
                displayEl.classList.add('pulse');
            }
            rafId = requestAnimationFrame(tick);
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            startTime = performance.now();
            rafId = requestAnimationFrame(tick);
            cardEl.classList.add('running');
            pillEl.className = 'status-pill running';
            statusTxt.textContent = 'Bezig…';
            sep1.classList.remove('paused');
            sep2.classList.remove('paused');
            btnStart.textContent = '⏸ Pauze';
            btnStart.onclick = pauseTimer;
            btnStart.className = 'btn btn-pause';
        }

        function pauseTimer() {
            if (!isRunning) return;
            isRunning = false;
            elapsed += performance.now() - startTime;
            cancelAnimationFrame(rafId);
            cardEl.classList.remove('running');
            pillEl.className = 'status-pill paused';
            statusTxt.textContent = 'Gepauzeerd';
            sep1.classList.add('paused');
            sep2.classList.add('paused');
            btnStart.textContent = '▶ Doorgaan';
            btnStart.onclick = startTimer;
            btnStart.className = 'btn btn-start';
        }

        function resetTimer() {
            if (isRunning) { cancelAnimationFrame(rafId); isRunning = false; }
            elapsed = getInitialElapsedFromQuery();
            startTime = null;
            prevSec = -1;
            renderTime(elapsed);
            cardEl.classList.remove('running');
            pillEl.className = 'status-pill idle';
            statusTxt.textContent = 'Klaar om te starten';
            sep1.classList.remove('paused');
            sep2.classList.remove('paused');
            btnStart.textContent = '▶ Start';
            btnStart.onclick = startTimer;
            btnStart.className = 'btn btn-start';
        }

        document.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                const overlay = document.getElementById('countdown-overlay');
                if (!overlay.classList.contains('hidden')) return;
                isRunning ? pauseTimer() : startTimer();
            }
            if (e.code === 'KeyR') {
                const overlay = document.getElementById('countdown-overlay');
                if (!overlay.classList.contains('hidden')) return;
                resetTimer();
            }
        });

        // ══════════════════════════════════════════
        //  BACKGROUND: LIGHTNING + STARS
        // ══════════════════════════════════════════
        (function () {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let W, H;

            // Stars
            let stars = [];
            function initStars() {
                stars = Array.from({ length: 120 }, () => ({
                    x: Math.random() * W, y: Math.random() * H,
                    r: Math.random() * 1.2 + 0.2,
                    a: Math.random(), speed: Math.random() * 0.25 + 0.08,
                    dir: Math.random() > 0.5 ? 1 : -1,
                }));
            }

            // Lightning bolts
            const BOLT_COLORS = ['#4fc3f7', '#ff6b35', '#e91e8c', '#f5a623', '#b36bff'];
            let bolts = [];
            let nextBolt = 0;

            function makeBolt() {
                const x1 = Math.random() * W;
                const y1 = -20;
                const segments = 6 + Math.floor(Math.random() * 6);
                const pts = [{ x: x1, y: y1 }];
                for (let i = 1; i <= segments; i++) {
                    pts.push({
                        x: x1 + (Math.random() - 0.5) * 300,
                        y: y1 + (H + 40) * (i / segments),
                    });
                }
                return { pts, color: BOLT_COLORS[Math.floor(Math.random() * BOLT_COLORS.length)], life: 0, maxLife: 18 };
            }

            function drawBolt(b) {
                const alpha = 1 - b.life / b.maxLife;
                ctx.beginPath();
                ctx.moveTo(b.pts[0].x, b.pts[0].y);
                for (let i = 1; i < b.pts.length; i++) ctx.lineTo(b.pts[i].x, b.pts[i].y);
                ctx.strokeStyle = b.color;
                ctx.globalAlpha = alpha * 0.55;
                ctx.lineWidth = 2;
                ctx.shadowColor = b.color;
                ctx.shadowBlur = 18;
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
                initStars();
            }

            function draw(ts) {
                ctx.clearRect(0, 0, W, H);

                // stars
                stars.forEach(s => {
                    s.a += s.speed * 0.01 * s.dir;
                    if (s.a > 1) { s.a = 1; s.dir = -1; }
                    if (s.a < 0.1) { s.a = 0.1; s.dir = 1; }
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${s.a * 0.6})`;
                    ctx.fill();
                });

                // lightning
                if (ts > nextBolt) {
                    bolts.push(makeBolt());
                    nextBolt = ts + 1400 + Math.random() * 2200;
                }
                bolts = bolts.filter(b => b.life < b.maxLife);
                bolts.forEach(b => { drawBolt(b); b.life++; });

                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', resize);
            resize();
            requestAnimationFrame(draw);
        })();

        // ══════════════════════════════════════════
        //  FLOATING PUZZLE PIECES
        // ══════════════════════════════════════════
        (function () {
            const PIECES = ['🧩'];
            const COLORS = ['#f5a623', '#e91e8c', '#4fc3f7', '#3ddc84', '#ff6b35', '#b36bff'];
            const layer = document.getElementById('piecesLayer');
            const N = 14;

            for (let i = 0; i < N; i++) {
                const el = document.createElement('div');
                el.className = 'piece';
                el.textContent = PIECES[0];
                const size = 28 + Math.random() * 38;
                const left = 2 + Math.random() * 96;
                const dur = 14 + Math.random() * 22;
                const delay = -(Math.random() * dur);
                el.style.cssText = `
      font-size:${size}px;
      left:${left}%;
      animation-duration:${dur}s;
      animation-delay:${delay}s;
      color:${COLORS[Math.floor(Math.random() * COLORS.length)]};
      filter: drop-shadow(0 0 6px currentColor);
    `;
                layer.appendChild(el);
            }
        })();
    </script>
</body>
